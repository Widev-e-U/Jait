name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Jait do instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Constraints, alternatives, screenshots, or examples
