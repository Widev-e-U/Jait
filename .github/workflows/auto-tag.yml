# ──────────────────────────────────────────────────────────────────────
# Auto-tag on version bump
# ──────────────────────────────────────────────────────────────────────
# HOW IT WORKS:
#   When `packages/gateway/package.json` is pushed to main with a changed
#   "version" field, this workflow creates a git tag `v<version>` and pushes
#   it. That tag then triggers the Release workflow (.github/workflows/release.yml)
#   which builds desktop/Android, publishes all npm packages, and creates a
#   GitHub Release.
#
# TO RELEASE A NEW VERSION:
#   1. Bump "version" in packages/gateway/package.json (e.g. "0.1.14" → "0.1.15")
#   2. Commit and push to main
#   3. This workflow auto-creates the v0.1.15 tag
#   4. release.yml triggers: npm publish → desktop builds → GitHub Release
#
# NOTES:
#   - No manual `git tag` or `npm publish` is needed.
#   - If the tag already exists (e.g. from a manual push), this is a no-op.
#   - Only watches packages/gateway/package.json — the gateway version is the
#     single source of truth for the monorepo release version.
# ──────────────────────────────────────────────────────────────────────

name: Auto-tag on version bump

on:
  push:
    branches: [main]
    paths:
      - packages/gateway/package.json

jobs:
  tag:
    name: Create git tag if version changed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need previous commit to diff the version

      - name: Detect version change
        id: version
        run: |
          NEW_VERSION=$(jq -r '.version' packages/gateway/package.json)
          OLD_VERSION=$(git show HEAD~1:packages/gateway/package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")

          echo "old=$OLD_VERSION"
          echo "new=$NEW_VERSION"

          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$NEW_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check tag doesn't already exist
        if: steps.version.outputs.changed == 'true'
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Tagged $TAG — this will trigger the Release workflow"
