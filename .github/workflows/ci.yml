name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  docker:
    name: Build Docker Images
    runs-on: self-hosted
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_HOST: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image owner (lowercase)
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "IMAGE_OWNER=${OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Produce semver tag only on version tags (e.g. v0.2.0)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "semver=true" >> $GITHUB_OUTPUT
          else
            echo "semver=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.gateway
          push: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-gateway:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-gateway:${{ github.sha }}
            ${{ steps.version.outputs.semver == 'true' && format('{0}/{1}/jait-gateway:v{2}', env.REGISTRY_HOST, env.IMAGE_OWNER, steps.version.outputs.version) || '' }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '' }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID || '' }}
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-web:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-web:${{ github.sha }}
            ${{ steps.version.outputs.semver == 'true' && format('{0}/{1}/jait-web:v{2}', env.REGISTRY_HOST, env.IMAGE_OWNER, steps.version.outputs.version) || '' }}
