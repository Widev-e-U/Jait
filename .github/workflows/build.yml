name: Build and push images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*', 'release-*']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_HOST: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image owner (lowercase)
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "IMAGE_OWNER=${OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend (jait-api)
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-api:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-api:${{ github.sha }}

      - name: Build and push frontend (jait-ui)
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://jait.dev/api' }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID || '' }}
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-ui:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_OWNER }}/jait-ui:${{ github.sha }}
