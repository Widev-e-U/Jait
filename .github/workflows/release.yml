# ──────────────────────────────────────────────────────────────────────────────
# Release workflow — auto-tag + publish + build
# ──────────────────────────────────────────────────────────────────────────────
# HOW IT WORKS:
#   1. On every push to main that touches any watched package.json
#      (gateway, shared, web), the "auto-tag" job checks if any version
#      field changed.
#   2. If it changed, a v<version> git tag is created.
#   3. All downstream jobs (npm publish, desktop builds, Android APK,
#      GitHub Release) run only when a new tag was created.
#   4. Can also be triggered manually or by pushing a v* tag directly.
#
# TO RELEASE A NEW VERSION:
#   1. Bump "version" in packages/gateway/package.json (and optionally
#      the other sub-packages if their code changed).
#   2. Commit and push to main.
#   3. This workflow handles everything: tag → npm publish → builds → release.
#
# NOTES:
#   - No manual `git tag` or `npm publish` is needed.
#   - The gateway version in packages/gateway/package.json is the single
#     source of truth for monorepo release versions.
#   - If a tag already exists, the auto-tag step is a no-op.
#   - workflow_dispatch and v* tag pushes skip the auto-tag job and go
#     straight to publish/build.
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]
    paths:
      - packages/gateway/package.json
      - packages/shared/package.json
      - apps/web/package.json
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  # ── Auto-tag on version bump (only on branch push, not tag push) ───
  auto-tag:
    name: Auto-tag if version changed
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.push-tag.outputs.tagged || 'false' }}
      version: ${{ steps.version.outputs.version || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          # Gateway version is always the tag source
          GW_VERSION=$(jq -r '.version' packages/gateway/package.json)
          echo "gateway=$GW_VERSION"

          # Check if ANY watched package.json version changed
          CHANGED=false
          for PKG in packages/gateway/package.json packages/shared/package.json apps/web/package.json; do
            NEW=$(jq -r '.version' "$PKG" 2>/dev/null || echo "")
            OLD=$(git show HEAD~1:"$PKG" 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
            if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
              echo "$PKG changed: $OLD → $NEW"
              CHANGED=true
            fi
          done

          if [ "$CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$GW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check tag doesn't already exist
        if: steps.version.outputs.changed == 'true'
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        id: push-tag
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tagged=true" >> $GITHUB_OUTPUT
          echo "✅ Tagged $TAG"

  # ── Build desktop apps (Electron) ──────────────────────────────────
  desktop-windows:
    name: Desktop — Windows
    runs-on: windows-latest
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Build Electron (Windows)
        working-directory: apps/desktop
        run: bun run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: apps/desktop/dist/*.exe

  desktop-macos:
    name: Desktop — macOS
    runs-on: macos-latest
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Build Electron (macOS)
        working-directory: apps/desktop
        run: bun run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: apps/desktop/dist/*.dmg

  desktop-linux:
    name: Desktop — Linux
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Build Electron (Linux)
        working-directory: apps/desktop
        run: bun run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: apps/desktop/dist/*.AppImage

  # ── Build Android APK ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk

  # ── Publish npm packages (in dependency order) ─────────────────────
  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    environment: npm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run build

      # 1. Publish @jait/shared (no workspace deps)
      - name: Publish @jait/shared
        working-directory: packages/shared
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2. Publish @jait/screen-share (depends on shared)
      - name: Resolve workspace deps (screen-share)
        working-directory: packages/screen-share
        run: |
          VERSION=$(jq -r '.version' ../shared/package.json)
          jq --arg v "^$VERSION" '.dependencies["@jait/shared"] = $v' package.json > tmp.json && mv tmp.json package.json
      - name: Publish @jait/screen-share
        working-directory: packages/screen-share
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 3. Publish @jait/web (pre-built frontend — strip deps, everything bundled by Vite)
      - name: Strip deps from @jait/web (static files only)
        working-directory: apps/web
        run: jq '.dependencies = {} | .devDependencies = {}' package.json > tmp.json && mv tmp.json package.json
      - name: Publish @jait/web
        working-directory: apps/web
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 4. Publish @jait/gateway (depends on shared + screen-share + web)
      - name: Resolve workspace deps (gateway)
        working-directory: packages/gateway
        run: |
          SHARED_V=$(jq -r '.version' ../shared/package.json)
          SCREEN_V=$(jq -r '.version' ../screen-share/package.json)
          WEB_V=$(jq -r '.version' ../../apps/web/package.json)
          jq --arg sv "^$SHARED_V" --arg scv "^$SCREEN_V" --arg wv "^$WEB_V" \
            '.dependencies["@jait/shared"] = $sv | .dependencies["@jait/screen-share"] = $scv | .dependencies["@jait/web"] = $wv' \
            package.json > tmp.json && mv tmp.json package.json
      - name: Publish @jait/gateway
        working-directory: packages/gateway
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release with all assets ──────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [auto-tag, npm-publish]
    if: |
      always() && needs.npm-publish.result == 'success' && (
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract version
        id: version
        run: |
          # Prefer auto-tag output, fall back to tag ref or package.json
          if [ -n "${{ needs.auto-tag.outputs.version }}" ]; then
            echo "version=${{ needs.auto-tag.outputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(jq -r '.version' packages/gateway/package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Jait v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
