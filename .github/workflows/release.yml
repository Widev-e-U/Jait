# ──────────────────────────────────────────────────────────────────────────────
# Release workflow — auto-tag + publish + build
# ──────────────────────────────────────────────────────────────────────────────
# HOW IT WORKS:
#   1. On every push to main that touches any watched package.json
#      (gateway, shared, web), the "auto-tag" job checks if any version
#      field changed.
#   2. If it changed, a v<version> git tag is created.
#   3. All downstream jobs (npm publish, desktop builds, Android APK,
#      GitHub Release) run only when a new tag was created.
#   4. Can also be triggered manually or by pushing a v* tag directly.
#
# TO RELEASE A NEW VERSION:
#   1. Bump "version" in packages/gateway/package.json (and optionally
#      the other sub-packages if their code changed).
#   2. Commit and push to main.
#   3. This workflow handles everything: tag → npm publish → builds → release.
#
# NOTES:
#   - No manual `git tag` or `npm publish` is needed.
#   - The gateway version in packages/gateway/package.json is the single
#     source of truth for monorepo release versions.
#   - If a tag already exists, the auto-tag step is a no-op.
#   - workflow_dispatch and v* tag pushes skip the auto-tag job and go
#     straight to publish/build.
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]
    paths:
      - packages/gateway/package.json
      - packages/shared/package.json
      - apps/web/package.json
      - packages/screen-share/package.json
      - apps/desktop/package.json
      - apps/mobile/package.json
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_asset_mode:
        description: "How to move build outputs into the release job"
        required: false
        default: runner
        type: choice
        options:
          - runner
          - github-artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_ASSET_DIR: /tmp/jait-release-assets/${{ github.run_id }}
  RELEASE_ASSET_MODE: ${{ inputs.release_asset_mode || 'runner' }}
  RELEASE_ASSET_RETENTION_DAYS: 1

permissions:
  contents: write
  packages: write

jobs:
  # ── Auto-tag on version bump (only on branch push, not tag push) ───
  auto-tag:
    name: Auto-tag if version changed
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.push-tag.outputs.tagged || 'false' }}
      changed: ${{ steps.version.outputs.changed || 'false' }}
      version: ${{ steps.version.outputs.version || '' }}
      gateway_changed: ${{ steps.version.outputs.gateway_changed || 'false' }}
      shared_changed: ${{ steps.version.outputs.shared_changed || 'false' }}
      web_changed: ${{ steps.version.outputs.web_changed || 'false' }}
      screen_share_changed: ${{ steps.version.outputs.screen_share_changed || 'false' }}
      desktop_changed: ${{ steps.version.outputs.desktop_changed || 'false' }}
      mobile_changed: ${{ steps.version.outputs.mobile_changed || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          # Gateway version is always the tag source
          GW_VERSION=$(jq -r '.version' packages/gateway/package.json)
          echo "gateway=$GW_VERSION"

          # Check if ANY watched package.json version changed
          CHANGED=false
          GATEWAY_CHANGED=false
          SHARED_CHANGED=false
          WEB_CHANGED=false
          SCREEN_SHARE_CHANGED=false
          DESKTOP_CHANGED=false
          MOBILE_CHANGED=false
          for PKG in packages/gateway/package.json packages/shared/package.json apps/web/package.json packages/screen-share/package.json apps/desktop/package.json apps/mobile/package.json; do
            NEW=$(jq -r '.version' "$PKG" 2>/dev/null || echo "")
            OLD=$(git show HEAD~1:"$PKG" 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
            if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
              echo "$PKG changed: $OLD → $NEW"
              CHANGED=true
              case "$PKG" in
                packages/gateway/package.json) GATEWAY_CHANGED=true ;;
                packages/shared/package.json) SHARED_CHANGED=true ;;
                apps/web/package.json) WEB_CHANGED=true ;;
                packages/screen-share/package.json) SCREEN_SHARE_CHANGED=true ;;
                apps/desktop/package.json) DESKTOP_CHANGED=true ;;
                apps/mobile/package.json) MOBILE_CHANGED=true ;;
              esac
            fi
          done

          echo "gateway_changed=$GATEWAY_CHANGED" >> $GITHUB_OUTPUT
          echo "shared_changed=$SHARED_CHANGED" >> $GITHUB_OUTPUT
          echo "web_changed=$WEB_CHANGED" >> $GITHUB_OUTPUT
          echo "screen_share_changed=$SCREEN_SHARE_CHANGED" >> $GITHUB_OUTPUT
          echo "desktop_changed=$DESKTOP_CHANGED" >> $GITHUB_OUTPUT
          echo "mobile_changed=$MOBILE_CHANGED" >> $GITHUB_OUTPUT

          if [ "$CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$GW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check tag doesn't already exist
        if: steps.version.outputs.changed == 'true'
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        id: push-tag
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tagged=true" >> $GITHUB_OUTPUT
          echo "✅ Tagged $TAG"

  # ── Build desktop apps (Electron) ──────────────────────────────────
  desktop:
    name: "Desktop Builds (Linux runner: Linux + Windows)"
    runs-on: [self-hosted, linux]
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.desktop_changed == 'true' ||
        needs.auto-tag.outputs.changed == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
      && (
        github.event_name != 'push' ||
        github.ref != 'refs/heads/main' ||
        needs.auto-tag.outputs.desktop_changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Prepare release asset directory
        run: mkdir -p "$RELEASE_ASSET_DIR"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Check Linux runner prerequisites
        run: |
          echo "Runner: $(uname -a)"
          if ! command -v wine &>/dev/null; then
            echo "::error::Wine is not installed. Install it on the runner: sudo apt install -y wine64"
            exit 1
          fi
          echo "Wine found: $(wine --version)"
      - name: Ensure 7za is available for NSIS packaging
        run: |
          if command -v 7za &>/dev/null; then
            echo "7za found: $(command -v 7za)"
            exit 0
          fi

          if command -v 7zz &>/dev/null; then
            mkdir -p "$RUNNER_TEMP/bin"
            printf '%s\n' '#!/usr/bin/env bash' 'exec 7zz "$@"' > "$RUNNER_TEMP/bin/7za"
            chmod +x "$RUNNER_TEMP/bin/7za"
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
            echo "Using 7zz shim at $RUNNER_TEMP/bin/7za"
            exit 0
          fi

          BUNDLED_7ZA="$(node -p "try { require('7zip-bin').path7za || '' } catch { '' }")"
          if [ -n "$BUNDLED_7ZA" ] && [ -x "$BUNDLED_7ZA" ]; then
            mkdir -p "$RUNNER_TEMP/bin"
            ln -sf "$BUNDLED_7ZA" "$RUNNER_TEMP/bin/7za"
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
            echo "Using bundled 7za from $BUNDLED_7ZA"
            exit 0
          fi

          if command -v sudo &>/dev/null && command -v apt-get &>/dev/null; then
            if sudo -n true 2>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y p7zip-full
            else
              echo "::warning::sudo is available but requires a password; skipping automatic p7zip installation."
            fi
          fi

          if ! command -v 7za &>/dev/null; then
            echo "::error::Missing 7za. Install p7zip-full on the runner or provide 7zz/7za in PATH before starting the job."
            exit 1
          fi

          echo "7za found: $(command -v 7za)"
      - name: Build AppX assets (Win11 context menu DLL)
        run: |
          # Install MinGW cross-compiler if not present
          if ! command -v x86_64-w64-mingw32-g++ &>/dev/null; then
            if command -v sudo &>/dev/null && sudo -n true 2>/dev/null; then
              sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64
            else
              echo "::warning::MinGW cross-compiler not available. Win11 modern context menu DLL will be skipped."
            fi
          fi
          DESKTOP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          chmod +x apps/desktop/build/build-appx.sh
          apps/desktop/build/build-appx.sh --version "$DESKTOP_VERSION"
      - name: Build Electron (Linux)
        working-directory: apps/desktop
        run: bun run build:linux
      - name: Build Electron (Windows)
        working-directory: apps/desktop
        env:
          USE_SYSTEM_7ZA: "true"
        run: bun run build:win
      - name: Stage desktop release assets on runner
        if: env.RELEASE_ASSET_MODE == 'runner'
        run: |
          cp -v apps/desktop/release/*.AppImage "$RELEASE_ASSET_DIR"/
          cp -v apps/desktop/release/*.deb "$RELEASE_ASSET_DIR"/
          cp -v apps/desktop/release/latest-linux.yml "$RELEASE_ASSET_DIR"/
          cp -v apps/desktop/release/*.exe "$RELEASE_ASSET_DIR"/
          cp -v apps/desktop/release/latest.yml "$RELEASE_ASSET_DIR"/
      - name: Upload desktop release assets to GitHub Artifacts
        if: env.RELEASE_ASSET_MODE == 'github-artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-assets
          retention-days: ${{ env.RELEASE_ASSET_RETENTION_DAYS }}
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/latest-linux.yml
            apps/desktop/release/*.exe
            apps/desktop/release/latest.yml

  # ── Build macOS desktop app (skipped — no macOS runner available) ─
  # To enable: add a macOS self-hosted runner or fix GitHub billing,
  # then uncomment this job and add it back to the release 'needs'.
  # desktop-macos:
  #   name: Desktop Build (macOS)
  #   runs-on: macos-latest
  #   needs: [auto-tag]
  #   if: |
  #     always() && (
  #       needs.auto-tag.outputs.tagged == 'true' ||
  #       needs.auto-tag.outputs.changed == 'true' ||
  #       startsWith(github.ref, 'refs/tags/v') ||
  #       github.event_name == 'workflow_dispatch'
  #     )
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: oven-sh/setup-bun@v2
  #     - run: bun install --frozen-lockfile
  #     - run: bun run build
  #     - name: Build Electron (macOS)
  #       working-directory: apps/desktop
  #       run: bun run build:mac
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: desktop-macos
  #         path: |
  #           apps/desktop/release/*.dmg

  # ── Build Android APK ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: [self-hosted, linux]
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.mobile_changed == 'true' ||
        needs.auto-tag.outputs.changed == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
      && (
        github.event_name != 'push' ||
        github.ref != 'refs/heads/main' ||
        needs.auto-tag.outputs.mobile_changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepare release asset directory
        run: mkdir -p "$RELEASE_ASSET_DIR"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Android SDK already installed — skipping download"
          else
            rm -rf "$ANDROID_HOME/cmdline-tools/latest"
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            cd /tmp
            curl -fsSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -qo cmdline-tools.zip
            mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1
          fi
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Capacitor sync
        working-directory: apps/mobile
        run: npx cap sync android
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > apps/mobile/android/local.properties
      - name: Build APK
        working-directory: apps/mobile/android
        run: chmod +x gradlew && ./gradlew assembleRelease
      - name: Stage Android release assets on runner
        if: env.RELEASE_ASSET_MODE == 'runner'
        run: cp -v apps/mobile/android/app/build/outputs/apk/release/*.apk "$RELEASE_ASSET_DIR"/
      - name: Upload Android release assets to GitHub Artifacts
        if: env.RELEASE_ASSET_MODE == 'github-artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          retention-days: ${{ env.RELEASE_ASSET_RETENTION_DAYS }}
          if-no-files-found: error
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk

  # ── Publish npm packages (in dependency order) ─────────────────────
  npm-publish:
    name: Publish npm packages
    runs-on: [self-hosted, linux]
    needs: [auto-tag]
    if: |
      always() && (
        needs.auto-tag.outputs.tagged == 'true' ||
        needs.auto-tag.outputs.changed == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    environment: npm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run build

      # 1. Publish @jait/shared (no workspace deps)
      - name: Publish @jait/shared
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.shared_changed == 'true'
        working-directory: packages/shared
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2. Publish @jait/screen-share (depends on shared)
      - name: Resolve workspace deps (screen-share)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.screen_share_changed == 'true'
        working-directory: packages/screen-share
        run: |
          VERSION=$(jq -r '.version' ../shared/package.json)
          jq --arg v "^$VERSION" '.dependencies["@jait/shared"] = $v' package.json > tmp.json && mv tmp.json package.json
      - name: Publish @jait/screen-share
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.screen_share_changed == 'true'
        working-directory: packages/screen-share
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 3. Bundle web frontend into gateway package (no separate @jait/web publish)
      - name: Bundle web dist into gateway
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.gateway_changed == 'true'
        run: |
          rm -rf packages/gateway/web-dist
          cp -r apps/web/dist packages/gateway/web-dist
          echo "✅ Bundled web frontend into packages/gateway/web-dist"

      # 4. Publish @jait/gateway (depends on shared + screen-share, web bundled inside)
      - name: Resolve workspace deps (gateway)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.gateway_changed == 'true'
        working-directory: packages/gateway
        run: |
          SHARED_V=$(jq -r '.version' ../shared/package.json)
          SCREEN_V=$(jq -r '.version' ../screen-share/package.json)
          jq --arg sv "^$SHARED_V" --arg scv "^$SCREEN_V" \
            '.dependencies["@jait/shared"] = $sv | .dependencies["@jait/screen-share"] = $scv | del(.dependencies["@jait/web"])' \
            package.json > tmp.json && mv tmp.json package.json
      - name: Publish @jait/gateway
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || needs.auto-tag.outputs.gateway_changed == 'true'
        working-directory: packages/gateway
        run: |
          npm publish --access public 2>&1 | tee /tmp/npm-out.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q 'EPUBLISHCONFLICT\|You cannot publish over' /tmp/npm-out.log; then
              echo "⏭ Already published — skipping"
            else
              cat /tmp/npm-out.log; exit $status
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release with all assets ──────────────────────────
  release:
    name: Create GitHub Release
    runs-on: [self-hosted, linux]
    needs: [auto-tag, npm-publish, desktop, android]
    if: |
      always() && 
      needs.npm-publish.result == 'success' && 
      contains(fromJSON('["success","skipped"]'), needs.desktop.result) && 
      contains(fromJSON('["success","skipped"]'), needs.android.result) && (
        needs.auto-tag.outputs.tagged == 'true' ||
        needs.auto-tag.outputs.changed == 'true' ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4
      - name: Prepare release asset directory
        run: mkdir -p "$RELEASE_ASSET_DIR"
      - name: Download GitHub Artifacts
        if: env.RELEASE_ASSET_MODE == 'github-artifacts'
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.RELEASE_ASSET_DIR }}
          merge-multiple: true
      - name: Verify staged release assets
        if: env.RELEASE_ASSET_MODE == 'runner'
        run: |
          test -d "$RELEASE_ASSET_DIR"
          ls -lah "$RELEASE_ASSET_DIR"
      - name: Verify downloaded release assets
        if: env.RELEASE_ASSET_MODE == 'github-artifacts'
        run: ls -lah "$RELEASE_ASSET_DIR"

      - name: Extract version
        id: version
        run: |
          # Prefer auto-tag output, fall back to tag ref or package.json
          if [ -n "${{ needs.auto-tag.outputs.version }}" ]; then
            echo "version=${{ needs.auto-tag.outputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(jq -r '.version' packages/gateway/package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing release and recreate
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          echo "Cleaning up release $TAG"
          gh release delete "$TAG" --yes --repo "${{ github.repository }}" 2>&1 || echo "No existing release for $TAG — nothing to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Jait v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ env.RELEASE_ASSET_DIR }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up staged release assets
        if: always()
        run: rm -rf "$RELEASE_ASSET_DIR"
