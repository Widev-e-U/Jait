name: Publish CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"

jobs:
  publish:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter @jait/cli build
      - name: Publish @jait/cli
        run: bun publish ./packages/cli --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
