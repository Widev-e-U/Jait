services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8000:8000"
      - "18789:18789"
    volumes:
      - jait-data:/data
    environment:
      - NODE_ENV=production
      - PORT=8000
      - WS_PORT=18789
      - LOG_LEVEL=info
      - JAIT_DATA_DIR=/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  jait-data:
