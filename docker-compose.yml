version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:agent@db:5432/agent_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEBUG=true
    env_file:
      - ./src/backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/backend/app:/app/app:ro  # Hot reload for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-client-id}
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
