version: '3.8'

networks:
  backend:
    external: true
  frontend:
    external: true

services:
  backend:
    image: ghcr.io/${GITHUB_REPO:-yourorg/agent-chat}/backend:latest
    env_file:
      - agent.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:${DB_PASSWORD}@db:5432/agent_db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DEBUG=false
    networks:
      - backend
      - frontend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == base
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.agent-api.tls=true
        - traefik.http.routers.agent-api.tls.certresolver=cloudflare
        - traefik.http.routers.agent-api.entrypoints=websecure
        - traefik.http.routers.agent-api.rule=Host(`jait.dev`) && PathPrefix(`/api`)
        - traefik.http.routers.agent-api.middlewares=api-stripprefix
        - traefik.http.middlewares.api-stripprefix.stripprefix.prefixes=/api
        - traefik.http.services.agent-api.loadbalancer.server.port=8000

  frontend:
    image: ghcr.io/${GITHUB_REPO:-yourorg/agent-chat}/frontend:latest
    networks:
      - frontend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == base
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.agent-web.tls=true
        - traefik.http.routers.agent-web.tls.certresolver=cloudflare
        - traefik.http.routers.agent-web.entrypoints=websecure
        - traefik.http.routers.agent-web.rule=Host(`jait.dev`)
        - traefik.http.services.agent-web.loadbalancer.server.port=80

  db:
    image: postgres:16-alpine
    env_file:
      - agent.env
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=agent_db
    networks:
      - backend
    volumes:
      - /mnt/data/agent-db:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == base
      restart_policy:
        condition: any
