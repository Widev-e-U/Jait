version: '3.8'

networks:
  backend:
    external: true
  frontend:
    external: true

services:
  # ── Jait Gateway (serves API + WebSocket + Web UI on port 8000) ──
  gateway:
    image: ghcr.io/jakobwl/jait-gateway:latest
    env_file:
      - agent.env
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOST=0.0.0.0
      - CORS_ORIGIN=https://jait.basenetwork.net
    volumes:
      - /mnt/data/jait:/root/.jait
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
      - frontend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == base
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - traefik.enable=true
        # HTTPS router — handles all of jait.basenetwork.net
        - traefik.http.routers.jait.tls=true
        - traefik.http.routers.jait.tls.certresolver=cloudflare
        - traefik.http.routers.jait.entrypoints=websecure
        - traefik.http.routers.jait.rule=Host(`jait.basenetwork.net`)
        - traefik.http.services.jait.loadbalancer.server.port=8000
        # WebSocket support
        - traefik.http.middlewares.jait-headers.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.jait.middlewares=jait-headers

  db:
    image: postgres:16-alpine
    env_file:
      - agent.env
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=agent_db
    networks:
      - backend
    volumes:
      - /mnt/data/agent-db:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == base
      restart_policy:
        condition: any
